<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>训练模拟区</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <h1>🎯 训练模拟区</h1>
            <div class="header-links">
                <a href="/">🏠 主页</a>
                <a href="/admin">📊 管理面板</a>
                <a href="/samples">📚 样本库</a>
                <a href="/training" class="active">🎯 训练模拟</a>
                <a href="/quality">📈 质量看板</a>
            </div>
        </header>

        <div class="suggestion-card" id="suggestionCard"></div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">总提交数</div>
                <div class="stat-value" id="totalSubmissions">-</div>
            </div>
            <div class="stat-card bg-success">
                <div class="stat-label">整体准确率</div>
                <div class="stat-value" id="overallAccuracy">-</div>
            </div>
            <div class="stat-card bg-info">
                <div class="stat-label">已标注数</div>
                <div class="stat-value" id="totalAnnotations">-</div>
            </div>
            <div class="stat-card bg-primary">
                <div class="stat-label">标注准确率</div>
                <div class="stat-value" id="annotationAccuracy">-</div>
            </div>
            <div class="stat-card bg-warning">
                <div class="stat-label">训练批次数</div>
                <div class="stat-value" id="batchCount">-</div>
            </div>
        </div>

        <div class="tabs" style="margin:20px 0 10px">
            <button class="tab-btn active" data-tab="workspace">标注工作区</button>
            <button class="tab-btn" data-tab="history">批次报告历史</button>
            <button class="tab-btn" data-tab="trend">准确率趋势</button>
        </div>

        <div id="tab-workspace" class="tab-content active">
            <div class="section">
                <h2 style="margin-top:0">📝 当前批次标注</h2>
                <div class="filter-bar" style="margin:10px 0">
                    <div class="filter-group">
                        <span>难度：</span>
                        <select id="difficultySelect">
                            <option value="auto">自动（AI推荐）</option>
                            <option value="normal">普通</option>
                            <option value="hard">困难</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <span>样本数量：</span>
                        <select id="sampleCountSelect">
                            <option value="4">4 张</option>
                            <option value="6" selected>6 张</option>
                            <option value="9">9 张</option>
                            <option value="12">12 张</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="loadTrainingSamples()">🎲 新批次样本</button>
                    <span class="badge badge-info" id="currentDifficultyBadge">难度: -</span>
                </div>
                <div id="samplesContainer" class="annotation-grid">
                    <div class="annotation-history-card" style="text-align:center;grid-column:1/-1">
                        <p class="muted">点击上方"新批次样本"开始</p>
                    </div>
                </div>
                <div style="margin:20px 0;text-align:center">
                    <button class="btn btn-success btn-lg" id="submitAllBtn" onclick="submitAllAnnotations()" disabled style="font-size:16px;padding:12px 36px">
                        📊 提交并生成本批次报告
                    </button>
                </div>
            </div>

            <div id="batchReport" style="display:none;margin-top:20px">
                <h2>📋 最近批次报告</h2>
                <div id="batchReportContent" class="training-batch-card"></div>
            </div>
        </div>

        <div id="tab-history" class="tab-content">
            <div id="batchHistory" class="annotation-history-card">
                <p class="muted" style="text-align:center;padding:20px">暂无历史批次。完成一次标注后点击"提交并生成本批次报告"</p>
            </div>
        </div>

        <div id="tab-trend" class="tab-content">
            <div class="trend-chart-container">
                <h3 style="margin-top:0">📈 整体准确率趋势（分段统计）</h3>
                <div id="trendBars" class="trend-bars"></div>
            </div>
            <div id="annotationHistory" class="section" style="margin-top:20px">
                <h2 style="margin-top:0">📜 标注历史（最近 100 条）</h2>
                <table class="admin-table">
                    <thead>
                        <tr><th>时间</th><th>验证码</th><th>标注</th><th>结果</th><th>来源</th></tr>
                    </thead>
                    <tbody id="annotationTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    let currentSamples = [];
    let currentAnnotations = [];

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            const tabId = btn.getAttribute('data-tab');
            document.getElementById('tab-' + tabId).classList.add('active');
            if (tabId === 'history') loadBatchHistory();
            if (tabId === 'trend') { loadTrendData(); loadAnnotationHistory(); }
        });
    });

    function loadSuggestion() {
        fetch('/api/training/suggestion')
            .then(r => r.json())
            .then(data => {
                if (data.success) renderSuggestion(data.suggestion);
            });
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('totalSubmissions').textContent = data.summary.total_submissions;
                document.getElementById('overallAccuracy').textContent = data.summary.accuracy + '%';
                document.getElementById('totalAnnotations').textContent = data.summary.total_annotations;
                document.getElementById('annotationAccuracy').textContent = data.summary.annotation_accuracy + '%';
                document.getElementById('batchCount').textContent = data.summary.training_batches_count;
            });
    }

    function renderSuggestion(s) {
        const diffLabel = s.recommended_difficulty === 'normal' ? '普通模式 (推荐)' : '困难模式 (推荐)';
        const diffCls = s.recommended_difficulty === 'normal' ? 'badge-info' : 'badge-warning';
        const card = document.getElementById('suggestionCard');
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:15px">
                <div>
                    <h3 style="margin:0 0 8px 0">🤖 AI 训练建议</h3>
                    <div style="font-size:15px;margin-bottom:10px">${escapeHtml(s.reason)}</div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px">
                        <span class="badge ${diffCls}" style="font-size:14px;padding:6px 12px">🎯 ${diffLabel}</span>
                        <span class="badge badge-success" style="font-size:13px">📊 历史准确率 ${s.accuracy}%</span>
                        <span class="badge badge-info" style="font-size:13px">📝 总提交 ${s.total_submissions} 条</span>
                    </div>
                </div>
                <div style="min-width:260px;background:rgba(255,255,255,0.6);padding:12px 16px;border-radius:10px">
                    <div style="font-weight:600;margin-bottom:8px;color:#2c3e50">💡 下一步建议</div>
                    <ul style="margin:0;padding-left:18px;line-height:1.7;color:#34495e;font-size:13px">
                        ${s.next_steps.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
                    </ul>
                </div>
            </div>
        `;
    }

    function loadTrainingSamples() {
        const count = document.getElementById('sampleCountSelect').value;
        const difficulty = document.getElementById('difficultySelect').value;
        const btn = document.querySelector('button[onclick="loadTrainingSamples()"]');
        btn.disabled = true; btn.textContent = '加载中...';

        fetch(`/api/training/samples?count=${count}&difficulty=${difficulty}`)
            .then(r => r.json())
            .then(data => {
                btn.disabled = false; btn.textContent = '🎲 新批次样本';
                if (!data.success) { alert('加载失败'); return; }
                currentSamples = data.samples;
                currentAnnotations = [];
                document.getElementById('currentDifficultyBadge').textContent =
                    '难度: ' + (data.difficulty === 'hard' ? '困难' : data.difficulty === 'normal' ? '普通' : '自动');
                renderSamples(data.samples);
                document.getElementById('submitAllBtn').disabled = false;
                document.getElementById('batchReport').style.display = 'none';
            })
            .catch(() => { btn.disabled = false; btn.textContent = '🎲 新批次样本'; });
    }

    function renderSamples(samples) {
        const c = document.getElementById('samplesContainer');
        c.innerHTML = samples.map(s => {
            const img = 'data:image/png;base64,' + btoa(String.fromCharCode(...new Uint8Array(hexToBytes(s.image_data))));
            return `<div class="annotation-card" id="card-${s.id}">
                <div style="text-align:center;margin-bottom:10px">
                    <img src="${img}" alt="captcha" style="border-radius:8px;border:2px solid #ddd;background:#fff" />
                </div>
                <input type="text" class="annotation-input" id="input-${s.id}"
                    placeholder="输入验证码"
                    maxlength="8"
                    autocomplete="off"
                    data-sample="${s.id}"
                    data-expected="${s.captcha_text}" />
                <div id="feedback-${s.id}" style="min-height:20px;text-align:center;margin-top:4px;font-size:12px"></div>
            </div>`;
        }).join('');

        document.querySelectorAll('.annotation-input').forEach(inp => {
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitSingle(inp);
                }
            });
        });

        document.querySelectorAll('.annotation-input')[0]?.focus();
    }

    function submitSingle(inp) {
        const id = inp.getAttribute('data-sample');
        const expected = inp.getAttribute('data-expected').toUpperCase();
        const val = inp.value.trim().toUpperCase();
        const feedback = document.getElementById('feedback-' + id);
        const card = document.getElementById('card-' + id);

        if (!val) {
            feedback.innerHTML = '<span style="color:#888">请输入</span>';
            return;
        }

        const isCorrect = val === expected;
        inp.classList.remove('input-correct', 'input-wrong');
        inp.classList.add(isCorrect ? 'input-correct' : 'input-wrong');
        inp.disabled = true;
        feedback.innerHTML = isCorrect
            ? '<span style="color:#27ae60;font-weight:bold">✓ 正确！</span>'
            : `<span style="color:#c0392b;font-weight:bold">✗ 错误</span><span style="color:#888;margin-left:6px">正确答案：${escapeHtml(expected)}</span>`;

        const idx = currentAnnotations.findIndex(a => a.sample_id === id);
        const record = { sample_id: id, expected: expected, label: val, is_correct: isCorrect };
        if (idx >= 0) currentAnnotations[idx] = record;
        else currentAnnotations.push(record);

        fetch('/api/annotations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ captcha_text: expected, label: val, source: 'training' })
        });
    }

    function submitAllAnnotations() {
        const inputs = document.querySelectorAll('.annotation-input');
        inputs.forEach(inp => { if (!inp.disabled) submitSingle(inp); });

        setTimeout(() => {
            const difficulty = document.getElementById('difficultySelect').value;
            fetch('/api/training/batches', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    samples: currentSamples,
                    annotations: currentAnnotations,
                    difficulty: difficulty
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('batchCount').textContent =
                        (parseInt(document.getElementById('batchCount').textContent) || 0) + 1;
                    renderBatchReport(data.batch);
                    document.getElementById('batchReport').style.display = 'block';
                    document.getElementById('submitAllBtn').disabled = true;
                    document.getElementById('submitAllBtn').textContent = '✅ 已完成，点击"新批次样本"开始下一批';
                }
            });
            loadSuggestion();
        }, 200);
    }

    function renderBatchReport(batch) {
        const content = document.getElementById('batchReportContent');
        const deltaHtml = batch.delta === null
            ? '<span class="muted">(首批次无对比)</span>'
            : batch.delta > 0
                ? `<span style="color:#27ae60;font-weight:bold">↑ 比上一批提升 ${batch.delta}%</span>`
                : batch.delta < 0
                    ? `<span style="color:#c0392b;font-weight:bold">↓ 比上一批下降 ${Math.abs(batch.delta)}%</span>`
                    : `<span class="muted">和上一批持平</span>`;

        const wrongCharsHtml = (batch.top_wrong_chars && batch.top_wrong_chars.length > 0)
            ? `<div style="margin-top:12px;padding:12px;background:#fff5f0;border-radius:8px">
                    <div style="font-weight:600;margin-bottom:8px;color:#c0392b">🔤 错得最多的字符（这一批）</div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap">
                        ${batch.top_wrong_chars.map(([ch, cnt]) => `
                            <div style="padding:6px 14px;background:#c0392b;color:#fff;border-radius:20px;font-family:monospace">
                                <span style="font-size:18px;font-weight:bold;margin-right:6px">${escapeHtml(ch)}</span>
                                <span style="font-size:12px">× ${cnt} 次</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`
            : '<div style="margin-top:12px;color:#27ae60">🎉 这批没有字符被识别错！</div>';

        const detailsHtml = batch.details && batch.details.length > 0
            ? `<div style="margin-top:16px">
                <div style="font-weight:600;margin-bottom:8px">📋 本批标注明细</div>
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
                    ${batch.details.map(d => `
                        <div style="padding:8px 10px;border:1px solid ${d.is_correct ? '#27ae6033' : '#c0392b33'};border-radius:6px;background:${d.is_correct ? '#f0fff4' : '#fff5f5'}">
                            <div style="font-family:monospace;font-size:12px">
                                <span style="color:#888">期望：</span><strong>${escapeHtml(d.expected)}</strong><br/>
                                <span style="color:#888">标注：</span>
                                <strong style="color:${d.is_correct ? '#27ae60' : '#c0392b'}">${escapeHtml(d.label || '(空)')}</strong>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>` : '';

        content.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:15px">
                <div>
                    <div style="font-size:14px;color:#666">批次ID：${batch.id}｜${escapeHtml(batch.timestamp)}｜难度：${batch.difficulty === 'hard' ? '困难' : batch.difficulty === 'normal' ? '普通' : '自动'}</div>
                    <div style="margin:10px 0;display:flex;gap:20px;align-items:baseline;flex-wrap:wrap">
                        <div><span style="font-size:36px;font-weight:bold;color:${batch.accuracy >= 80 ? '#27ae60' : batch.accuracy >= 50 ? '#f39c12' : '#c0392b'}">${batch.accuracy}%</span>
                        <div class="muted">本批正确率</div></div>
                        <div><span style="font-size:24px;font-weight:bold;color:#27ae60">✔ ${batch.correct}</span> / <span style="font-size:24px;font-weight:bold;color:#c0392b">✘ ${batch.wrong}</span>
                        <div class="muted">共 ${batch.total} 题</div></div>
                        <div style="padding:8px 16px;border-radius:10px;background:#fff">${deltaHtml}</div>
                    </div>
                </div>
            </div>
            ${wrongCharsHtml}
            ${detailsHtml}
        `;
    }

    function loadBatchHistory() {
        fetch('/api/training/batches?limit=20')
            .then(r => r.json())
            .then(data => {
                const el = document.getElementById('batchHistory');
                if (data.batches.length === 0) {
                    el.innerHTML = '<p class="muted" style="text-align:center;padding:20px">暂无历史批次</p>';
                    return;
                }
                el.innerHTML = data.batches.map(b => {
                    const deltaHtml = b.delta === null
                        ? '<span class="muted" style="font-size:12px">(首批)</span>'
                        : b.delta > 0
                            ? `<span style="color:#27ae60;font-weight:bold">↑ +${b.delta}%</span>`
                            : b.delta < 0
                                ? `<span style="color:#c0392b;font-weight:bold">↓ ${b.delta}%</span>`
                                : `<span class="muted">持平</span>`;
                    const wrongHtml = b.top_wrong_chars && b.top_wrong_chars.length > 0
                        ? `<div style="margin-top:8px;font-size:12px"><span class="muted">易错字符：</span>${b.top_wrong_chars.slice(0,3).map(([ch,cnt]) => `<span style="padding:2px 8px;background:#c0392b;color:#fff;border-radius:12px;margin:0 3px;font-family:monospace">${escapeHtml(ch)}×${cnt}</span>`).join('')}</div>`
                        : '';
                    return `<div class="training-batch-card" style="margin:12px 0;border-left:4px solid ${b.accuracy >= 80 ? '#27ae60' : b.accuracy >= 50 ? '#f39c12' : '#c0392b'}">
                        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
                            <div>
                                <h4 style="margin:0 0 5px 0">
                                    <span style="font-family:monospace;color:#2c3e50">${escapeHtml(b.id)}</span>
                                    <span class="badge ${b.accuracy >= 80 ? 'badge-success' : b.accuracy >= 50 ? 'badge-warning' : 'badge-danger'}" style="margin-left:8px">${b.accuracy}%</span>
                                    ${deltaHtml}
                                </h4>
                                <div class="muted" style="font-size:12px">${escapeHtml(b.timestamp)}｜难度：${b.difficulty === 'hard' ? '困难' : b.difficulty === 'normal' ? '普通' : '自动'}｜✔ ${b.correct} / ✘ ${b.wrong} / 共 ${b.total}</div>
                                ${wrongHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');
            });
    }

    function loadTrendData() {
        fetch('/api/training/suggestion')
            .then(r => r.json())
            .then(data => {
                if (!data.success) return;
                const trend = data.suggestion.trend || [];
                const bars = document.getElementById('trendBars');
                if (trend.length === 0) {
                    bars.innerHTML = '<div class="muted" style="padding:20px;text-align:center">暂无足够数据生成趋势</div>';
                    return;
                }
                bars.innerHTML = trend.map(t => {
                    const h = Math.max(8, t.accuracy);
                    const cls = t.accuracy >= 80 ? 'bg-success' : t.accuracy >= 50 ? 'bg-warning' : 'bg-danger';
                    return `<div class="trend-bar" style="height:${h}%" title="${t.label} - ${t.accuracy}%">
                        <div class="trend-bar-fill ${cls}" style="height:100%"></div>
                        <div class="trend-bar-label">${t.accuracy}%</div>
                        <div class="trend-bar-count">${t.count}</div>
                    </div>`;
                }).join('');
            });
    }

    function loadAnnotationHistory() {
        fetch('/api/annotations?limit=100')
            .then(r => r.json())
            .then(data => {
                const tbody = document.getElementById('annotationTableBody');
                tbody.innerHTML = data.annotations.map(a => {
                    const resultCls = a.is_correct ? 'text-success' : 'text-danger';
                    const resultText = a.is_correct ? '✔ 正确' : '✗ 错误';
                    return `<tr>
                        <td>${escapeHtml(a.timestamp)}</td>
                        <td><code>${escapeHtml(a.captcha_text)}</code></td>
                        <td><code class="${resultCls}">${escapeHtml(a.label)}</code></td>
                        <td><span class="${resultCls}">${resultText}</span></td>
                        <td>${escapeHtml(a.source || '-')}</td>
                    </tr>`;
                }).join('');
            });
    }

    function hexToBytes(hex) {
        const bytes = [];
        for (let i = 0; i < hex.length; i += 2) bytes.push(parseInt(hex.substr(i, 2), 16));
        return bytes;
    }

    loadSuggestion();
    </script>
</body>
</html>
