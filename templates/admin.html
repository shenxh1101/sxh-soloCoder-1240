<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - 验证码识别平台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container admin-container">
        <header class="admin-header">
            <div class="header-left">
                <h1>📊 管理面板</h1>
                <p class="subtitle">验证码识别数据统计与管理</p>
            </div>
            <div class="header-links">
                <a href="{{ url_for('index') }}" class="back-link">← 返回主页</a>
                <a href="{{ url_for('samples_page') }}" class="back-link">📚 样本库</a>
                <a href="{{ url_for('training_page') }}" class="back-link">🎯 训练模拟</a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-info">
                    <div class="stat-value" id="total-submissions">0</div>
                    <div class="stat-label">总提交次数</div>
                </div>
            </div>
            <div class="stat-card success">
                <div class="stat-icon">✅</div>
                <div class="stat-info">
                    <div class="stat-value" id="correct-count">0</div>
                    <div class="stat-label">正确识别</div>
                </div>
            </div>
            <div class="stat-card danger">
                <div class="stat-icon">❌</div>
                <div class="stat-info">
                    <div class="stat-value" id="wrong-count">0</div>
                    <div class="stat-label">错误识别</div>
                </div>
            </div>
            <div class="stat-card primary">
                <div class="stat-icon">🎯</div>
                <div class="stat-info">
                    <div class="stat-value"><span id="accuracy">0</span>%</div>
                    <div class="stat-label">准确率</div>
                </div>
            </div>
            <div class="stat-card warning">
                <div class="stat-icon">💡</div>
                <div class="stat-info">
                    <div class="stat-value" id="total-corrections">0</div>
                    <div class="stat-label">纠错提交</div>
                </div>
            </div>
            <div class="stat-card info">
                <div class="stat-icon">🔤</div>
                <div class="stat-info">
                    <div class="stat-value" id="unique-captchas">0</div>
                    <div class="stat-label">唯一验证码</div>
                </div>
            </div>
        </div>

        <div class="admin-actions">
            <div class="difficulty-control">
                <label>全局难度：</label>
                <select id="global-difficulty" onchange="setGlobalDifficulty()">
                    <option value="normal">普通模式</option>
                    <option value="hard">困难模式</option>
                </select>
            </div>
            <div class="mutation-control">
                <button class="btn btn-primary" onclick="generateMutations()">
                    🔄 基于纠错生成变异样本
                </button>
                <input type="number" id="mutation-count" value="5" min="1" max="20" style="width: 60px; padding: 8px;">
            </div>
            <div class="export-import-control">
                <button class="btn btn-success" onclick="exportData()">📥 导出数据</button>
                <label class="btn btn-warning file-btn">
                    📤 导入数据
                    <input type="file" id="import-file" accept=".json" onchange="importData(event)" style="display:none;">
                </label>
            </div>
            <button class="btn btn-refresh" onclick="loadData()">🔄 刷新数据</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('submissions')">提交记录</button>
            <button class="tab-btn" onclick="switchTab('captcha-stats')">验证码统计</button>
            <button class="tab-btn" onclick="switchTab('mutation-samples')">变异样本预览</button>
        </div>

        <div id="submissions" class="tab-content active">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>结果筛选：</label>
                    <select id="filter-result" onchange="applyFilters()">
                        <option value="all">全部</option>
                        <option value="correct">仅正确</option>
                        <option value="wrong">仅错误</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>文本搜索：</label>
                    <input type="text" id="filter-text" placeholder="输入验证码内容..." oninput="applyFilters()">
                </div>
                <div class="filter-group">
                    <label>日期从：</label>
                    <input type="date" id="filter-date-from" onchange="applyFilters()">
                </div>
                <div class="filter-group">
                    <label>到：</label>
                    <input type="date" id="filter-date-to" onchange="applyFilters()">
                </div>
                <button class="btn btn-refresh" onclick="resetFilters()">重置</button>
                <div class="filter-count" id="filter-count"></div>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>验证码</th>
                            <th>用户输入</th>
                            <th>结果</th>
                            <th>IP地址</th>
                        </tr>
                    </thead>
                    <tbody id="submissions-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="captcha-stats" class="tab-content">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>验证码</th>
                            <th>总次数</th>
                            <th>正确</th>
                            <th>错误</th>
                            <th>准确率</th>
                            <th>难度评估</th>
                        </tr>
                    </thead>
                    <tbody id="captcha-stats-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="mutation-samples" class="tab-content">
            <div id="mutation-samples-container" class="mutation-samples">
                <p class="empty-text">点击"基于纠错生成变异样本"按钮查看生成的验证码</p>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'submissions';

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function switchTab(tabName) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        async function loadData() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                updateSummary(data.summary);
                updateSubmissions(data.submissions);
                updateCaptchaStats(data.captcha_stats);
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function updateSummary(summary) {
            document.getElementById('total-submissions').textContent = summary.total_submissions;
            document.getElementById('correct-count').textContent = summary.correct_count;
            document.getElementById('wrong-count').textContent = summary.wrong_count;
            document.getElementById('accuracy').textContent = summary.accuracy;
            document.getElementById('total-corrections').textContent = summary.total_corrections;
            document.getElementById('unique-captchas').textContent = summary.unique_captchas;
        }

        function renderSubmissions(submissions) {
            const tbody = document.getElementById('submissions-body');
            if (submissions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-text">暂无提交记录</td></tr>';
                return;
            }
            
            tbody.innerHTML = submissions.map(s => `
                <tr>
                    <td>${escapeHtml(s.timestamp)}</td>
                    <td><code class="captcha-code">${escapeHtml(s.captcha_text)}</code></td>
                    <td><code class="${s.is_correct ? 'correct' : 'wrong'}">${escapeHtml(s.user_input || '(空)')}</code></td>
                    <td>
                        <span class="badge ${s.is_correct ? 'badge-success' : 'badge-danger'}">
                            ${s.is_correct ? '✓ 正确' : '✗ 错误'}
                        </span>
                    </td>
                    <td class="muted">${escapeHtml(s.ip || '-')}</td>
                </tr>
            `).join('');
        }

        function updateSubmissions(submissions) {
            renderSubmissions(submissions);
        }

        function updateCaptchaStats(stats) {
            const tbody = document.getElementById('captcha-stats-body');
            if (stats.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-text">暂无统计数据</td></tr>';
                return;
            }
            
            tbody.innerHTML = stats.map(s => {
                let difficulty = '简单';
                let diffClass = 'badge-success';
                if (s.accuracy < 30) {
                    difficulty = '极难';
                    diffClass = 'badge-danger';
                } else if (s.accuracy < 60) {
                    difficulty = '困难';
                    diffClass = 'badge-warning';
                } else if (s.accuracy < 80) {
                    difficulty = '中等';
                    diffClass = 'badge-info';
                }
                
                return `
                    <tr>
                        <td><code class="captcha-code">${escapeHtml(s.text)}</code></td>
                        <td>${s.total}</td>
                        <td class="success-text">${s.correct}</td>
                        <td class="danger-text">${s.wrong}</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${s.accuracy}%"></div>
                                <span class="progress-text">${s.accuracy}%</span>
                            </div>
                        </td>
                        <td><span class="badge ${diffClass}">${difficulty}</span></td>
                    </tr>
                `;
            }).join('');
        }

        async function applyFilters() {
            const resultFilter = document.getElementById('filter-result').value;
            const textFilter = document.getElementById('filter-text').value;
            const dateFrom = document.getElementById('filter-date-from').value;
            const dateTo = document.getElementById('filter-date-to').value;

            try {
                const response = await fetch('/api/submissions/filter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        result_filter: resultFilter,
                        text_filter: textFilter,
                        date_from: dateFrom,
                        date_to: dateTo,
                        limit: 500
                    })
                });
                const data = await response.json();
                
                renderSubmissions(data.submissions);
                document.getElementById('filter-count').textContent = `匹配 ${data.count} 条`;
            } catch (error) {
                console.error('筛选失败:', error);
            }
        }

        function resetFilters() {
            document.getElementById('filter-result').value = 'all';
            document.getElementById('filter-text').value = '';
            document.getElementById('filter-date-from').value = '';
            document.getElementById('filter-date-to').value = '';
            document.getElementById('filter-count').textContent = '';
            loadData();
        }

        async function setGlobalDifficulty() {
            const difficulty = document.getElementById('global-difficulty').value;
            try {
                await fetch('/api/difficulty', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ difficulty })
                });
                showToast(`全局难度已设置为：${difficulty === 'hard' ? '困难模式' : '普通模式'}`);
            } catch (error) {
                console.error('设置难度失败:', error);
            }
        }

        async function generateMutations() {
            const count = document.getElementById('mutation-count').value;
            try {
                const response = await fetch('/api/generate_from_corrections', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ count })
                });
                const data = await response.json();
                
                if (!data.success) {
                    showToast(data.message, 'error');
                    return;
                }
                
                const container = document.getElementById('mutation-samples-container');
                container.innerHTML = `
                    <p class="mutation-info">基于 ${data.corpus_size} 条纠错数据生成了 ${data.samples.length} 个变异样本：</p>
                    <div class="samples-grid">
                        ${data.samples.map(s => `
                            <div class="sample-card">
                                <img src="data:image/png;base64,${hexToBase64(s.image_data)}" alt="${escapeHtml(s.text)}">
                                <code class="sample-text">${escapeHtml(s.text)}</code>
                            </div>
                        `).join('')}
                    </div>
                `;
                showToast(`成功生成 ${data.samples.length} 个变异样本`);
            } catch (error) {
                console.error('生成变异样本失败:', error);
                showToast('生成失败，请重试', 'error');
            }
        }

        function hexToBase64(hexStr) {
            const bytes = new Uint8Array(hexStr.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            let binary = '';
            bytes.forEach(b => binary += String.fromCharCode(b));
            return btoa(binary);
        }

        function exportData() {
            window.location.href = '/api/data/export';
            showToast('正在导出数据...');
        }

        async function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!confirm('确定要导入此数据吗？将与现有数据合并。')) {
                event.target.value = '';
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('merge', 'true');

            try {
                const response = await fetch('/api/data/import', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    showToast(`导入成功：${data.imported_submissions}条提交, ${data.imported_corrections}条纠错, ${data.imported_annotations}条标注`);
                    loadData();
                } else {
                    showToast(data.message || '导入失败', 'error');
                }
            } catch (error) {
                console.error('导入失败:', error);
                showToast('导入失败，请检查文件格式', 'error');
            } finally {
                event.target.value = '';
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('show');
            }, 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
