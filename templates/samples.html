<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纠错样本库</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header class="admin-header">
            <h1>📚 纠错样本库</h1>
            <div class="header-links">
                <a href="/">🏠 主页</a>
                <a href="/admin">📊 管理面板</a>
                <a href="/samples" class="active">📚 样本库</a>
                <a href="/training">🎯 训练模拟</a>
                <a href="/quality">📈 质量看板</a>
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">纠错记录 (可信)</div>
                <div class="stat-value" id="trustedCount" style="color:#27ae60">-</div>
            </div>
            <div class="stat-card bg-warning">
                <div class="stat-label">纠错记录 (可疑)</div>
                <div class="stat-value" id="suspectCount" style="color:#f39c12">-</div>
            </div>
            <div class="stat-card bg-danger">
                <div class="stat-label">纠错记录 (已废弃)</div>
                <div class="stat-value" id="discardedCount" style="color:#c0392b">-</div>
            </div>
            <div class="stat-card bg-info">
                <div class="stat-label">变异语料大小</div>
                <div class="stat-value" id="corpusSize">-</div>
            </div>
            <div class="stat-card bg-primary">
                <div class="stat-label">历史变异批次</div>
                <div class="stat-value" id="mutationBatchesCount">-</div>
            </div>
        </div>

        <div class="tabs" style="margin:20px 0 10px">
            <button class="tab-btn active" data-tab="corrections">纠错素材池</button>
            <button class="tab-btn" data-tab="generate">生成变异样本</button>
            <button class="tab-btn" data-tab="batches">历史批次</button>
        </div>

        <div id="tab-corrections" class="tab-content active">
            <div class="filter-bar" style="margin:10px 0">
                <div class="filter-group">
                    <span>状态筛选：</span>
                    <select id="statusFilter" onchange="loadCorrections()">
                        <option value="all">全部</option>
                        <option value="trusted">✨ 可信</option>
                        <option value="suspect">⚠️ 可疑</option>
                        <option value="discarded">🗑️ 已废弃</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span>搜索：</span>
                    <input type="text" id="searchText" placeholder="原始或纠错文本" />
                </div>
                <button class="btn btn-primary" onclick="loadCorrections()">筛选</button>
                <div class="filter-count">显示 <span id="correctionsDisplayCount">-</span> / 共 <span id="correctionsTotalCount">-</span> 条</div>
            </div>

            <div id="correctionsGrid" class="corrections-grid"></div>
        </div>

        <div id="tab-generate" class="tab-content">
            <div class="annotation-history-card">
                <h3 style="margin-top:0">⚙️ 变异样本生成器</h3>
                <div class="form-row" style="display:flex;gap:15px;align-items:center;flex-wrap:wrap;margin:15px 0">
                    <div>
                        <label>生成数量：</label>
                        <input type="number" id="genCount" value="6" min="1" max="20" style="width:70px" />
                    </div>
                    <div>
                        <label>语料来源：</label>
                        <select id="genSource">
                            <option value="trusted_only">仅可信数据（推荐）</option>
                            <option value="all">可信 + 可疑</option>
                        </select>
                    </div>
                    <div>
                        <label>批次名称（可选）：</label>
                        <input type="text" id="genName" placeholder="自定义批次名" style="width:180px" />
                    </div>
                    <button class="btn btn-primary" onclick="generateMutations()">生成</button>
                    <button id="saveMutationsBtn" class="btn btn-success" onclick="saveMutations()" style="display:none">💾 保存为本批次</button>
                </div>
                <p class="muted" id="genHint">✨ 使用可信纠错语料生成困难模式的变异样本，用于训练增强</p>
            </div>

            <div id="generatedSamples" class="corrections-grid" style="margin-top:15px"></div>
        </div>

        <div id="tab-batches" class="tab-content">
            <div id="batchesList" class="annotation-history-card">
                <p class="muted">保存的变异样本批次可以在这里回顾，生成后点击"保存为批次"才能看到记录</p>
            </div>
        </div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="previewTitle">样本预览</h3>
                <button class="close" onclick="closePreview()">&times;</button>
            </div>
            <div class="modal-body" id="previewBody"></div>
        </div>
    </div>

    <script>
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = String(text);
        return div.innerHTML;
    }

    let allCorrections = [];
    let lastGeneratedSamples = [];
    let lastGenSource = 'trusted_only';
    let lastCorpusSize = 0;

    const statusBadge = {
        trusted: { cls: 'badge-success', text: '可信' },
        suspect: { cls: 'badge-warning', text: '可疑' },
        discarded: { cls: 'badge-danger', text: '废弃' }
    };

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            const tabId = btn.getAttribute('data-tab');
            document.getElementById('tab-' + tabId).classList.add('active');
            if (tabId === 'batches') loadMutationBatches();
        });
    });

    function loadCorrections() {
        fetch('/api/corrections?status=all')
            .then(r => r.json())
            .then(data => {
                allCorrections = data.corrections || [];
                document.getElementById('corpusSize').textContent = data.corpus_trusted?.length || 0;

                const statusFilter = document.getElementById('statusFilter').value;
                const search = document.getElementById('searchText').value.trim().toUpperCase();

                let display = allCorrections;
                if (statusFilter !== 'all') {
                    display = display.filter(c => c.status === statusFilter);
                }
                if (search) {
                    display = display.filter(c =>
                        (c.original_text || '').toUpperCase().includes(search) ||
                        (c.correct_text || '').toUpperCase().includes(search)
                    );
                }

                document.getElementById('correctionsDisplayCount').textContent = display.length;
                document.getElementById('correctionsTotalCount').textContent = allCorrections.length;
                document.getElementById('trustedCount').textContent = allCorrections.filter(c => c.status === 'trusted').length;
                document.getElementById('suspectCount').textContent = allCorrections.filter(c => c.status === 'suspect').length;
                document.getElementById('discardedCount').textContent = allCorrections.filter(c => c.status === 'discarded').length;

                renderCorrections(display);
            });
    }

    function renderCorrections(items) {
        const grid = document.getElementById('correctionsGrid');
        if (items.length === 0) {
            grid.innerHTML = '<div class="annotation-history-card"><p class="muted" style="text-align:center">暂无纠错记录，先去主页提交一些验证码试试吧</p></div>';
            return;
        }
        grid.innerHTML = items.map(c => {
            const s = statusBadge[c.status || 'trusted'];
            return `<div class="correction-card" data-id="${c.id}">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <span class="badge ${s.cls}">${s.text}</span>
                    <span class="muted" style="font-size:11px">${escapeHtml(c.timestamp)}</span>
                </div>
                <div class="correction-pair">
                    <div class="muted" style="font-size:11px">识别为：</div>
                    <code style="color:#c0392b;font-size:16px;letter-spacing:2px">${escapeHtml(c.original_text)}</code>
                </div>
                <div class="correction-pair">
                    <div class="muted" style="font-size:11px">纠正为：</div>
                    <code style="color:#27ae60;font-size:16px;letter-spacing:2px">${escapeHtml(c.correct_text)}</code>
                </div>
                <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
                    <button class="btn btn-small btn-info" onclick="previewCorrection('${c.id}', '${c.original_text}', '${c.correct_text}')">预览</button>
                    ${(c.status !== 'trusted') ? `<button class="btn btn-small btn-success" onclick="updateStatus('${c.id}','trusted')">标记可信</button>` : ''}
                    ${(c.status !== 'suspect') ? `<button class="btn btn-small btn-warning" onclick="updateStatus('${c.id}','suspect')">标记可疑</button>` : ''}
                    ${(c.status !== 'discarded') ? `<button class="btn btn-small" onclick="updateStatus('${c.id}','discarded')">废弃</button>` : ''}
                    <button class="btn btn-small btn-danger" onclick="deleteCorrection('${c.id}')">删除</button>
                </div>
            </div>`;
        }).join('');
    }

    function updateStatus(id, status) {
        fetch(`/api/corrections/${id}/status`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: status })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert('✅ ' + data.message);
                loadCorrections();
            } else {
                alert('❌ ' + data.message);
            }
        });
    }

    function deleteCorrection(id) {
        if (!confirm('确定删除该纠错记录吗？')) return;
        fetch(`/api/corrections/${id}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                loadCorrections();
            });
    }

    function previewCorrection(id, orig, corr) {
        document.getElementById('previewModal').style.display = 'block';
        document.getElementById('previewTitle').textContent = '纠错预览：' + orig + ' → ' + corr;
        document.getElementById('previewBody').innerHTML = '<div class="muted" style="text-align:center;padding:30px">加载预览图中...</div>';

        fetch('/api/generate_correction_preview', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ original_text: orig, correct_text: corr })
        })
        .then(r => r.json())
        .then(data => {
            if (!data.success) {
                document.getElementById('previewBody').innerHTML = `<p style="color:#c0392b">${data.message}</p>`;
                return;
            }
            const origImg = 'data:image/png;base64,' + btoa(String.fromCharCode(...new Uint8Array(hexToBytes(data.original.image_data))));
            const corrImg = 'data:image/png;base64,' + btoa(String.fromCharCode(...new Uint8Array(hexToBytes(data.correction.image_data))));
            document.getElementById('previewBody').innerHTML = `
                <div class="preview-section">
                    <h4>原始识别内容 vs 纠正后的内容</h4>
                    <div class="preview-compare">
                        <div class="preview-item">
                            <div class="muted" style="margin-bottom:6px">用户识别为：<code style="color:#c0392b">${escapeHtml(data.original.text)}</code></div>
                            <img src="${origImg}" alt="original" style="border:2px solid #c0392b;border-radius:8px" />
                        </div>
                        <div class="preview-item">
                            <div class="muted" style="margin-bottom:6px">正确答案：<code style="color:#27ae60">${escapeHtml(data.correction.text)}</code></div>
                            <img src="${corrImg}" alt="correction" style="border:2px solid #27ae60;border-radius:8px" />
                        </div>
                    </div>
                </div>
                <div class="preview-section" style="margin-top:25px">
                    <h4>由该纠错语料生成的 3 个困难模式变异样本</h4>
                    <div class="preview-mutations">
                        ${data.mutations.map(m => {
                            const img = 'data:image/png;base64,' + btoa(String.fromCharCode(...new Uint8Array(hexToBytes(m.image_data))));
                            return `<div class="mutation-preview">
                                <img src="${img}" alt="${escapeHtml(m.text)}" />
                                <div style="text-align:center;margin-top:6px;font-family:monospace;letter-spacing:2px">${escapeHtml(m.text)}</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>
            `;
        });
    }

    function generateMutations() {
        const count = parseInt(document.getElementById('genCount').value) || 5;
        const source = document.getElementById('genSource').value;
        const btn = document.querySelector('#tab-generate button[onclick="generateMutations()"]');
        btn.disabled = true;
        btn.textContent = '生成中...';

        fetch('/api/generate_from_corrections', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ count: count, source: source })
        })
        .then(r => r.json())
        .then(data => {
            btn.disabled = false;
            btn.textContent = '生成';
            if (!data.success) {
                document.getElementById('generatedSamples').innerHTML = `<div class="annotation-history-card"><p style="color:#c0392b">${data.message}</p></div>`;
                return;
            }
            lastGeneratedSamples = data.samples;
            lastGenSource = source;
            lastCorpusSize = data.corpus_size;
            document.getElementById('saveMutationsBtn').style.display = 'inline-block';
            document.getElementById('genHint').innerHTML = `✅ 已基于 <strong>${data.corpus_size}</strong> 条${source === 'trusted_only' ? '可信' : ''}语料生成 <strong>${data.samples.length}</strong> 个样本`;

            document.getElementById('generatedSamples').innerHTML = data.samples.map(s => {
                const img = 'data:image/png;base64,' + btoa(String.fromCharCode(...new Uint8Array(hexToBytes(s.image_data))));
                return `<div class="correction-card">
                    <div style="text-align:center;margin-bottom:10px">
                        <span class="badge badge-info">ID: ${s.id}</span>
                    </div>
                    <div style="text-align:center">
                        <img src="${img}" alt="${s.text}" style="border-radius:8px;border:1px solid #ddd" />
                    </div>
                    <div style="text-align:center;margin-top:10px">
                        <code style="font-size:18px;letter-spacing:3px;color:#2c3e50">${escapeHtml(s.text)}</code>
                    </div>
                </div>`;
            }).join('');
        })
        .catch(() => {
            btn.disabled = false;
            btn.textContent = '生成';
        });
    }

    function saveMutations() {
        if (lastGeneratedSamples.length === 0) return;
        const name = document.getElementById('genName').value.trim();
        fetch('/api/mutation_batches', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: name,
                samples: lastGeneratedSamples,
                source: lastGenSource,
                corpus_size: lastCorpusSize
            })
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                alert('✅ ' + data.message + ' 批次ID：' + data.batch.id);
                document.getElementById('genName').value = '';
                lastGeneratedSamples = [];
                document.getElementById('saveMutationsBtn').style.display = 'none';
                document.getElementById('mutationBatchesCount').textContent =
                    (parseInt(document.getElementById('mutationBatchesCount').textContent) || 0) + 1;
            } else {
                alert('❌ ' + data.message);
            }
        });
    }

    function loadMutationBatches() {
        fetch('/api/mutation_batches')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('batchesList');
                document.getElementById('mutationBatchesCount').textContent = data.batches.length;
                if (data.batches.length === 0) {
                    list.innerHTML = '<p class="muted" style="text-align:center;padding:20px">暂无保存的批次。在"生成变异样本"Tab 中生成后点击"保存为批次"</p>';
                    return;
                }
                list.innerHTML = data.batches.map(b => {
                    return `<div class="training-batch-card" style="margin:12px 0;border-left:4px solid #3498db">
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <div>
                                <h4 style="margin:0 0 5px 0">${escapeHtml(b.name)} <span class="muted" style="font-size:12px">(${b.id})</span></h4>
                                <div class="muted" style="font-size:12px">时间：${escapeHtml(b.timestamp)}｜来源：${b.source === 'trusted_only' ? '仅可信' : '全部'}｜语料：${b.corpus_size}｜样本数：${b.count}</div>
                            </div>
                            <button class="btn btn-small btn-danger" onclick="deleteMutationBatch('${b.id}')">删除批次</button>
                        </div>
                        <div style="display:flex;gap:10px;overflow-x:auto;padding:10px 0;margin-top:10px">
                            ${b.samples.map(s => {
                                const img = 'data:image/png;base64,' + btoa(String.fromCharCode(...new Uint8Array(hexToBytes(s.image_data))));
                                return `<div style="flex-shrink:0;text-align:center;min-width:120px">
                                    <img src="${img}" alt="${escapeHtml(s.text)}" style="border:1px solid #ddd;border-radius:4px;height:50px" />
                                    <div style="font-family:monospace;letter-spacing:2px;font-size:12px;margin-top:4px">${escapeHtml(s.text)}</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
                }).join('');
            });
    }

    function deleteMutationBatch(id) {
        if (!confirm('确定删除该批次吗？')) return;
        fetch(`/api/mutation_batches/${id}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                alert(data.message);
                loadMutationBatches();
            });
    }

    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
    }

    function hexToBytes(hex) {
        const bytes = [];
        for (let i = 0; i < hex.length; i += 2) {
            bytes.push(parseInt(hex.substr(i, 2), 16));
        }
        return bytes;
    }

    document.getElementById('searchText')?.addEventListener('keydown', e => {
        if (e.key === 'Enter') loadCorrections();
    });

    window.onclick = e => {
        if (e.target.classList.contains('modal')) closePreview();
    };

    loadCorrections();
    </script>
</body>
</html>
